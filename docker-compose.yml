services:
  api:
    build: .
    container_name: fastapi-app
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped